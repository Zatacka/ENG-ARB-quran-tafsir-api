name: WIC Sanadset discovery

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Resolve Mendeley file endpoint
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p out
          python - <<'PY'
          import json, re, urllib.error, urllib.parse, urllib.request
          base='https://data.mendeley.com'
          bundle_url=base+'/datasets/bundle.js?8fdc8cd3ae505244c753'
          req=urllib.request.Request(bundle_url,headers={'User-Agent':'WIC-Dataset-Discovery/1.0'})
          with urllib.request.urlopen(req,timeout=180) as response:
              bundle=response.read()
          open('out/bundle.js','wb').write(bundle)
          script=bundle.decode('utf-8','replace')
          print('bundle bytes',len(bundle))
          snippets=[]
          for pattern in ['/files','files?','folders','archive','download-all','apiBaseUrl','datasets-v2']:
              start=0
              count=0
              while True:
                  idx=script.find(pattern,start)
                  if idx<0: break
                  snippets.append(f'PATTERN {pattern}\n'+script[max(0,idx-500):idx+900])
                  start=idx+len(pattern)
                  count+=1
                  if count>=100: break
          open('out/bundle-snippets.txt','w',encoding='utf-8').write('\n\n==========\n\n'.join(snippets))
          paths=sorted(set(re.findall(r'["\'](/api/datasets-v2[^"\']+)["\']',script)))
          open('out/api-paths.json','w',encoding='utf-8').write(json.dumps(paths,ensure_ascii=False,indent=2))
          # Probe likely endpoints assembled from strings found in the bundle.
          candidates=[
              '/api/datasets-v2/datasets/5xth87zwb5/versions/4/files',
              '/api/datasets-v2/datasets/5xth87zwb5/versions/4/folders',
              '/api/datasets-v2/datasets/5xth87zwb5/versions/4/archive',
              '/api/datasets-v2/datasets/5xth87zwb5/versions/4/download',
              '/api/datasets-v2/datasets/5xth87zwb5/4/files',
              '/api/datasets-v2/datasets/5xth87zwb5/files?version=4',
          ]
          report=[]
          for path in candidates:
              url=base+path
              request=urllib.request.Request(url,headers={'User-Agent':'WIC-Dataset-Discovery/1.0','Accept':'application/json,*/*'})
              try:
                  with urllib.request.urlopen(request,timeout=120) as response:
                      data=response.read(); status=response.status; final=response.geturl(); ctype=response.headers.get('content-type')
              except urllib.error.HTTPError as exc:
                  data=exc.read(); status=exc.code; final=exc.geturl(); ctype=exc.headers.get('content-type')
              filename='probe-'+str(len(report))+'.bin'
              open('out/'+filename,'wb').write(data)
              report.append({'path':path,'status':status,'final_url':final,'content_type':ctype,'bytes':len(data),'filename':filename})
          open('out/report.json','w',encoding='utf-8').write(json.dumps(report,ensure_ascii=False,indent=2))
          PY
      - name: Upload discovery
        uses: actions/upload-artifact@v4
        with:
          name: wic-sanadset-discovery
          path: out/
          if-no-files-found: error
          retention-days: 1
