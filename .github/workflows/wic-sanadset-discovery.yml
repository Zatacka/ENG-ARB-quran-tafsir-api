name: WIC Sanadset discovery

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Sanadset file manifest
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p out
          python - <<'PY'
          import json, urllib.error, urllib.request
          headers={
              'User-Agent':'World-Islamic-Center/1.0 (+local dataset integration)',
              'Accept':'application/vnd.mendeley-public-dataset.1+json',
          }
          urls={
              'files-root.json':'https://data.mendeley.com/public-api/datasets/5xth87zwb5/files?folder_id=root&version=4',
              'files-no-folder.json':'https://data.mendeley.com/public-api/datasets/5xth87zwb5/files?version=4',
              'folders.json':'https://data.mendeley.com/public-api/datasets/5xth87zwb5/folders?version=4',
          }
          report=[]
          for filename,url in urls.items():
              req=urllib.request.Request(url,headers=headers)
              try:
                  with urllib.request.urlopen(req,timeout=180) as response:
                      data=response.read(); status=response.status; final=response.geturl(); ctype=response.headers.get('content-type')
              except urllib.error.HTTPError as exc:
                  data=exc.read(); status=exc.code; final=exc.geturl(); ctype=exc.headers.get('content-type')
              open('out/'+filename,'wb').write(data)
              report.append({'filename':filename,'status':status,'final_url':final,'content_type':ctype,'bytes':len(data),'preview':data[:500].decode('utf-8','replace')})
          open('out/report.json','w',encoding='utf-8').write(json.dumps(report,ensure_ascii=False,indent=2))
          PY
      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: wic-sanadset-discovery
          path: out/
          if-no-files-found: error
          retention-days: 1
