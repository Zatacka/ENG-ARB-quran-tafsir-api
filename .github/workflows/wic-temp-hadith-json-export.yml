name: WIC supplemental Hadith export

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Export supplementary structured Hadith sources
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/CheeseWithSauce/HadithsJSONFormat.git hadith-json-source
          git clone --depth 1 https://github.com/rufaruqui/hisnul-muslim.git hisnul-muslim-source
          rm -rf hadith-json-source/.git hisnul-muslim-source/.git
          find hadith-json-source -maxdepth 3 -type f | sort > hadith-json-file-list.txt
          find hisnul-muslim-source -maxdepth 4 -type f | sort > hisnul-muslim-file-list.txt
      - name: Upload source export
        uses: actions/upload-artifact@v4
        with:
          name: wic-hadith-supplemental-sources
          path: |
            hadith-json-source/
            hisnul-muslim-source/
            hadith-json-file-list.txt
            hisnul-muslim-file-list.txt
          if-no-files-found: error
          retention-days: 1
