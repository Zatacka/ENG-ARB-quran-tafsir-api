name: WIC local API export

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Package local Tafsir API
        uses: actions/upload-artifact@v4
        with:
          name: wic-local-tafsir-api
          path: |
            app/
            catalog/
            dataset/
            examples/
            scripts/
            tests/
            .dockerignore
            .env.example
            .gitignore
            DATA_NOTICE.md
            Dockerfile
            LICENSE
            NOTICE.md
            README.md
            RESOURCES.md
            compose.yaml
            pyproject.toml
            render.yaml
          if-no-files-found: error
          compression-level: 0
          retention-days: 1
