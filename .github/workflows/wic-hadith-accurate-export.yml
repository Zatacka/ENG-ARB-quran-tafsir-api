name: WIC accurate Hadith package export

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Preserve full edition metadata
        shell: python
        run: |
          from pathlib import Path
          path = Path('.github/scripts/build_wic_accurate_hadith_package.py')
          content = path.read_text(encoding='utf-8')
          content = content.replace(
              'for filename in (f"{edition}.min.json", f"{edition}.json"):',
              'for filename in (f"{edition}.json", f"{edition}.min.json"):',
          )
          path.write_text(content, encoding='utf-8')
      - name: Build accurate bilingual Hadith package
        run: python .github/scripts/build_wic_accurate_hadith_package.py
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: wic-accurate-hadith-package
          path: out/wic-hadith-core.sqlite3
          if-no-files-found: error
          compression-level: 9
          retention-days: 1
